name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.24'

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Check formatting
      run: |
        unformatted=$(gofmt -l ./internal/ ./cmd/ ./pkg/ 2>/dev/null)
        if [ -n "$unformatted" ]; then
          echo "::error::The following files are not formatted. Run 'gofmt -w ./internal/ ./cmd/ ./pkg/' to fix."
          echo "$unformatted"
          exit 1
        fi

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.8.0
        args: --timeout 10m

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23', '1.24']
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go }}-

    - name: Run tests
      run: |
        go test -v -race -coverpkg=./... -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Check coverage thresholds
      run: ./scripts/check-coverage.sh
      # Enforces per-package minimum coverage gates (see scripts/check-coverage.sh)
      # Thresholds: dao 6%, monitoring 47%, app 33%, config 20%, global 6%
      # Targets: All packages aim for 80% (docs/development/testing.md)

    - name: Upload coverage
      if: matrix.go == env.GO_VERSION
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        output_name=s9s-${{ matrix.os }}-${{ matrix.arch }}
        if [ "${{ matrix.os }}" = "windows" ]; then
          output_name="${output_name}.exe"
        fi
        go build -ldflags="-s -w" -o $output_name ./cmd/s9s

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: s9s-${{ matrix.os }}-${{ matrix.arch }}
        path: s9s-*

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run gosec security scanner
      uses: securego/gosec@v2.25.0
      continue-on-error: true  # Allow to fail - issues will be fixed in follow-up PRs
      with:
        args: './...'
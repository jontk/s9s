# S9S Configuration Example
# Copy this file to ~/.s9s/config.yaml and modify as needed

# Refresh rate for automatic updates.
# Applies to the currently focused view only; all views share this
# single cadence (default: 10s). Set to an empty string ("") to
# disable auto-refresh entirely — F5 and R still work for manual
# refresh. F6 pauses/resumes at runtime without touching config.
refreshRate: 10s

# Maximum retries for API calls
maxRetries: 3

# Default cluster to use
defaultCluster: production

# Cluster connections
clusters:
  - name: production
    cluster:
      endpoint: https://slurm-prod.example.com:6820
      token: ${SLURM_JWT}  # Can use environment variables
      apiVersion: v0.0.40
      insecure: false
      timeout: 30s
      # user: root  # Override SLURM username (default: OS user)
    namespace: default
    readOnly: false
    
  - name: development
    cluster:
      endpoint: https://slurm-dev.example.com:6820
      token: ${SLURM_DEV_JWT}
      apiVersion: v0.0.40
    namespace: dev
    readOnly: false

# UI settings
ui:
  skin: default  # Options: default, monokai, dracula
  logoless: false
  crumbsless: false
  statusless: false
  headless: false
  noIcons: false
  enableMouse: true

# View-specific settings
views:
  jobs:
    columns: [id, name, user, state, time, nodes, priority]
    showOnlyActive: true
    defaultSort: time
    maxJobs: 1000

    # Job submission wizard configuration
    # submission:
    #   # Global defaults for all new jobs
    #   formDefaults:
    #     partition: "compute"
    #     timeLimit: "04:00:00"
    #     nodes: 1
    #     cpus: 4
    #     memory: "8G"
    #     workingDir: "/scratch/%u"  # %u = username (SLURM substitution)
    #     outputFile: "slurm_%j.out"
    #     errorFile: "slurm_%j.err"
    #
    #   # Fields to hide from the submission form
    #   hiddenFields:
    #     - arraySpec
    #     - exclusive
    #     - requeue
    #
    #   # Restrict dropdown options (filters cluster-fetched values)
    #   fieldOptions:
    #     partition: ["compute", "gpu", "highmem"]
    #     qos: ["normal", "high"]
    #     account: ["research-a", "research-b"]
    #
    #   # Control which template sources are loaded (default: all three)
    #   # Options: "builtin", "config", "saved"
    #   # (Legacy: showBuiltinTemplates: false is equivalent to ["config", "saved"])
    #   templateSources: ["builtin", "config", "saved"]
    #
    #   # Custom templates
    #   templates:
    #     - name: "GPU Training Job"
    #       description: "PyTorch training on GPU partition"
    #       defaults:
    #         partition: "gpu"
    #         timeLimit: "24:00:00"
    #         cpus: 8
    #         memory: "32G"
    #         gpus: 2
    #         script: |
    #           #!/bin/bash
    #           module load cuda pytorch
    #           python train.py
    #       hiddenFields: ["arraySpec"]

  nodes:
    groupBy: partition  # Options: partition, state, feature
    showUtilization: true
    maxNodes: 500
    
  partitions:
    showQueueDepth: true
    showWaitTime: true

# Feature flags
features:
  streaming: true   # Enable real-time updates via WebSocket
  pulseye: true    # Enable health scanner
  xray: false      # Enable deep inspection mode

# Custom keyboard shortcuts
shortcuts:
  - key: ctrl+j
    action: "view:jobs"
    description: "Switch to jobs view"
    
  - key: ctrl+n
    action: "view:nodes"
    description: "Switch to nodes view"
    
  - key: ctrl+x
    action: "xray:toggle"
    description: "Toggle Xray mode"
    
  - key: ctrl+h
    action: "pulseye:scan"
    description: "Run health scan"

# Command aliases
aliases:
  ctx: context
  kj: "kill job"
  dj: "describe job"
  dn: "describe node"
  sub: "submit job"
  q: quit
  h: help

# Plugin configuration
plugins:
  - name: job-analyzer
    path: ~/.s9s/plugins/job-analyzer.so
    config:
      verbose: false
      maxAnalyzeTime: 5m
    
  - name: cost-tracker
    path: ~/.s9s/plugins/cost-tracker.so
    config:
      hourlyRate: 0.10
      currency: USD